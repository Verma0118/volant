services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: volant-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-volant}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - volant_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d volant"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: volant-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - volant_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  volant_postgres_data:
  volant_redis_data:

